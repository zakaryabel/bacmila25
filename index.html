<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>استمارة معلومات</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 800px;
      margin: auto;
      padding: 20px;
      direction: rtl;
    }
    h2 {
      text-align: center;
    }
    label {
      display: block;
      margin-top: 10px;
    }
    input, button {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
    }
    button {
      background-color: #4CAF50;
      color: white;
      border: none;
      margin-top: 15px;
      cursor: pointer;
    }
    button:hover {
      background-color: #45a049;
    }
    #confirmation {
      display: none;
      text-align: center;
    }
    .print-area {
      display: none;
    }
  </style>
</head>
<body>

<h2>استمارة معلومات خاصة بموظفي مركز البكالوريا - 2025</h2>

<form id="infoForm">
  <label>اللقب (بالعربية) *</label>
  <input type="text" name="lastName" required pattern="^[\u0600-\u06FF\s]+$" title="الرجاء إدخال اللقب باللغة العربية فقط">

  <label>الاسم (بالعربية) *</label>
  <input type="text" name="firstName" required pattern="^[\u0600-\u06FF\s]+$" title="الرجاء إدخال الاسم باللغة العربية فقط">

  <label>اللقب والاسم بالحروف اللاتينية (طبقا للصك البريدي) *</label>
  <input type="text" name="latinName" required pattern="^[A-Za-zÀ-ÿ\s]+$" title="يرجى استخدام الحروف اللاتينية فقط">

  <label>تاريخ الازدياد (مثال: 01 جانفي 1990) *</label>
  <input type="text" name="birthDate" required placeholder="مثال: 01 جانفي 1990">

  <label>مكان الازدياد *</label>
  <input type="text" name="birthPlace" required pattern="^[\u0600-\u06FF\s]+$" title="الرجاء إدخال المكان باللغة العربية فقط">

  <label>الرتبة *</label>
  <input type="text" name="rank" required pattern="^[\u0600-\u06FF\s]+$" title="الرجاء إدخال الرتبة باللغة العربية فقط">

  <label>مؤسسة العمل *</label>
  <input type="text" name="institution" required pattern="^[\u0600-\u06FF\s]+$" title="الرجاء إدخال المؤسسة باللغة العربية فقط">

  <label>الوظيفة في المركز *</label>
  <input type="text" name="function" required pattern="^[\u0600-\u06FF\s]+$" title="الرجاء إدخال الوظيفة باللغة العربية فقط">

  <label>المادة</label>
  <input type="text" name="subject" pattern="^[\u0600-\u06FF\s]*$" title="الرجاء إدخال المادة باللغة العربية فقط">

  <label>رقم الحساب البريدي الجاري *</label>
  <input type="text" name="postalAccountNumber" required pattern="^[0-9]+$" title="أرقام فقط">

  <label>المفتاح *</label>
  <input type="text" name="postalKey" required pattern="^[0-9]+$" title="أرقام فقط">

  <button type="submit">إرسال</button>
</form>

<div id="confirmation">
  <h3>✅ تم إرسال المعلومات بنجاح</h3>
  <button onclick="editForm()">تعديل المعلومات</button>
  <button onclick="printAndDownload()">طباعة / تحميل PDF</button>
</div>

<div class="print-area" id="printArea"></div>

<script>
  const form = document.getElementById('infoForm');
  const confirmation = document.getElementById('confirmation');
  const printArea = document.getElementById('printArea');
  let lastSubmittedData = {};

  form.addEventListener('submit', async function(e) {
    e.preventDefault();
    const formData = new FormData(form);
    const values = Object.fromEntries(formData.entries());
    lastSubmittedData = values;
const scriptURL = 'https://script.google.com/macros/s/AKfycby3TK7SDmpj5Pqbn-JFG88web4hJRjXhbR5IQWQAr6yUO8G9-W2xTZt7_pObp-KkH4/exec';


    try {
      const response = await fetch(scriptURL, {
        method: 'POST',
        body: new URLSearchParams(values),
      });
      if (response.ok) {
        form.style.display = 'none';
        confirmation.style.display = 'block';
      } else {
        alert('❌ حدث خطأ أثناء الإرسال.');
      }
    } catch (error) {
      alert('❌ فشل الاتصال بالخادم.');
    }
  });

  function editForm() {
    confirmation.style.display = 'none';
    form.style.display = 'block';
  }

  function printAndDownload() {
    const htmlContent = `
      <div style="direction:rtl; padding:20px; font-family:Arial;">
        <h3 style="text-align:center;">استمارة معلومات - مركز البكالوريا 2025</h3>
        <p><strong>اللقب:</strong> ${lastSubmittedData.lastName}</p>
        <p><strong>الاسم:</strong> ${lastSubmittedData.firstName}</p>
        <p><strong>اللقب والاسم باللاتينية:</strong> ${lastSubmittedData.latinName}</p>
        <p><strong>تاريخ الازدياد:</strong> ${lastSubmittedData.birthDate}</p>
        <p><strong>مكان الازدياد:</strong> ${lastSubmittedData.birthPlace}</p>
        <p><strong>الرتبة:</strong> ${lastSubmittedData.rank}</p>
        <p><strong>مؤسسة العمل:</strong> ${lastSubmittedData.institution}</p>
        <p><strong>الوظيفة في المركز:</strong> ${lastSubmittedData.function}</p>
        <p><strong>المادة:</strong> ${lastSubmittedData.subject || '-'}</p>
        <p><strong>رقم الحساب البريدي:</strong> ${lastSubmittedData.postalAccountNumber}</p>
        <p><strong>المفتاح:</strong> ${lastSubmittedData.postalKey}</p>
      </div>
    `;
    const printWindow = window.open('', '', 'width=800,height=1000');
    printWindow.document.write('<html><head><title>طباعة</title></head><body>');
    printWindow.document.write(htmlContent);
    printWindow.document.write('</body></html>');
    printWindow.document.close();
    printWindow.print();

    const blob = new Blob([htmlContent], { type: 'application/pdf' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'استمارة.pdf';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }
</script>

</body>
</html>
